name: quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  offline-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: "3.12"
          version: "0.11.32"
      - name: Install project
        run: uv sync --group dev
      - name: Compile
        run: uv run --no-sync python -m compileall -q backend frontend tests
      - name: Lint
        run: uv run --no-sync ruff check .
      - name: Check formatting
        run: uv run --no-sync ruff format --check .
      - name: Run offline tests
        run: uv run --no-sync pytest -q
      - name: Verify deterministic samples
        run: uv run --no-sync python scripts/generate_samples.py --check
